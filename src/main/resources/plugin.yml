name: NationWar
version: 1.0
main: com.nationwar.NationWar
api-version: 1.21 # 서버 버전에 맞춰 수정 가능 (예: 1.19, 1.20 등)
author: Gemini
description: 가스트 히트박스 기반의 국가 전쟁 및 코어 점령 플러그인

commands:
  gamestart:
    description: "6개의 코어를 무작위 위치에 생성합니다."
    permission: nationwar.admin
    usage: "/gamestart"
  메뉴:
    description: "국가 전쟁 메인 메뉴를 엽니다."
    usage: "/메뉴"
  tpa:
    description: "다른 플레이어에게 이동 요청을 보냅니다."
    usage: "/tpa [닉네임/수락/거절]"
  팀:
    description: "팀 관리 메뉴를 열거나 팀 관련 명령어를 수행합니다."
    usage: "/팀"
  국가창고:
    description: "소속된 팀의 공용 창고를 엽니다."
    usage: "/국가창고"

permissions:
  nationwar.admin:
    description: "관리자 전용 명령어 권한"
    default: op